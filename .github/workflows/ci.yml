name: CI - SIRH

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend:
    name: Frontend React
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend Symfony
    runs-on: ubuntu-latest

    services:
      database:
        image: mariadb:10.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: si_rh_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: test
      DATABASE_URL: "mysql://root:root@127.0.0.1:3306/si_rh?serverVersion=10.4.32-MariaDB&charset=utf8mb4"
      MAILER_DSN: "null://null"
      JWT_SECRET: "ci-only-jwt-secret-8d3a6f1c9e4b7a2d"

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo_mysql, sodium, zip

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Validate Symfony schema
        run: php bin/console doctrine:schema:validate --skip-sync

      - name: Create test database schema
        run: php bin/console doctrine:schema:create --env=test --no-interaction

      - name: Run backend tests
        run: php bin/phpunit --testdox
