security:
    # Symfony choisit automatiquement un algorithme de hachage adapte.
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # Le provider recharge l'entite User depuis la base a partir de l'email du JWT.
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            # Les outils de developpement et fichiers statiques ne demandent pas de JWT.
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        api:
            # Firewall sans session : chaque requete /api doit apporter son Bearer token.
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~
        main:
            lazy: true
            provider: app_user_provider

    # La premiere regle correspondante gagne : login et OPTIONS restent publics,
    # /api/admin exige ROLE_ADMIN et les autres routes exigent un JWT valide.
    access_control:
        - { path: ^/api, roles: PUBLIC_ACCESS, methods: [OPTIONS] }
        - { path: ^/api/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api/setup-admin$, roles: PUBLIC_ACCESS }
        - { path: ^/api/admin, roles: ROLE_ADMIN }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            # Cout reduit uniquement pendant PHPUnit pour accelerer la suite de tests.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
